<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLite | AI Content Scorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --primary: #6366F1;
            --accent: #10B981;
            --text: #F9FAFB;
            --card: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Abstract Background Glow */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary), transparent 70%);
            filter: blur(80px);
            opacity: 0.2;
            z-index: -1;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(50%, 50%) scale(1.5); }
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.05em; }
        p { color: #9CA3AF; margin-bottom: 2rem; font-size: 0.9rem; }

        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #6B7280; letter-spacing: 0.05em; }
        
        textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            resize: none;
            transition: 0.3s;
            outline: none;
        }

        textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover { background: #4F46E5; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .result {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            display: none;
        }

        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
        }

        .status { font-weight: 600; color: var(--accent); margin-bottom: 0.5rem; }
        .details { font-size: 0.8rem; color: #9CA3AF; }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="container">
        <h1>AuraLite</h1>
        <p>Instant AI Content Quality Scoring</p>
        
        <div class="input-group">
            <label>Paste Content to Analyze</label>
            <textarea id="content" rows="4" placeholder="Enter text or paste a URL..."></textarea>
        </div>
        
        <button class="btn" onclick="analyze()">
            <span id="btn-text">Analyze Content</span>
            <div id="loader" class="loader"></div>
        </button>
        
        <div id="result" class="result">
            <div class="score-circle" id="score">84</div>
            <div class="status">Brand Ready</div>
            <p class="details">Content aligns with premium brand standards. High emotional resonance detected.</p>
        </div>
    </div>

    <script>
        function analyze() {
            const content = document.getElementById('content').value;
            if (!content) return alert('Please enter some content');

            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');

            btnText.style.display = 'none';
            loader.style.display = 'block';
            result.style.display = 'none';

            setTimeout(() => {
                const score = Math.floor(Math.random() * 30) + 70; // Mock score 70-99
                document.getElementById('score').innerText = score;
                
                btnText.style.display = 'block';
                loader.style.display = 'none';
                result.style.display = 'block';
                result.style.animation = 'fadeIn 0.5s ease-out';
            }, 1500);
        }
    </script>
</body>
</html>
